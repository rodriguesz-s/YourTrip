   <div class="caixa-hospedagens">
    <h3>Encontre o Hotel mais próximo de você!</h3>
    <p>Digite o destino da sua viagem e te mostraremos o hotel mais próximo.</p>

    <input type="text" id="destino" placeholder="Ex: Paris, Maldivas, Vienna">
    <button onclick="buscarHotel()">Buscar hotel</button>
    <p id="resultado"></p>
   </div>

   <script>
  function buscarHotel() {
    const destino = document.getElementById("destino").value.trim().toLowerCase();
    const resultado = document.getElementById("resultado");

    if (destino === "") {
      resultado.innerText = "Por favor, digite um destino!";
      return;
    }

    let hotel;
    if (destino.includes("maldivas")) hotel = "Hotel Coral Paradise 🏝️";
    else if (destino.includes("frança") || destino.includes("paris")) hotel = "Hotel Étoile Paris ✨";
    else if (destino.includes("viena")) hotel = "Hotel Vienna Imperial 🏰";
    else hotel = "Desculpe, ainda não temos hotéis cadastrados para esse destino... 😞";

    resultado.innerText = `🏨 Hotel indicado: ${hotel}`;
  }
</script>
